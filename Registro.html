<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pagina.css">
    <title>Formulario de Registro</title>
</head>

<body>
    <section class="form-register">
        <h4>Formulario de Registro</h4>
        <form action="#" method="POST">
        <input class="controls" 
             type="text" name="nombres" 
             id="nombres" 
             placeholder="Ingrese su Nombre" required
             minlength="2"
             maxlength="50"
             pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]+"
             title="Solo letras y espacios">
        <input class="controls"
             type="text" 
             name="apellidos"
             id="apellidos"
             placeholder="Ingrese su Apellido" 
             required
             minlength="2"
             maxlength="50"
             pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]+"
             title="Solo letras y espacios">
        <input class="controls" 
             type="email" 
             name="correo" 
             id="correo" 
             placeholder="Ingrese su Email" 
             required>
        <input class="controls" type="password" name="contraseña" id="contraseña" placeholder="Ingrese su Contraseña"  required
             minlength="8"
             title="Mínimo 8 caracteres">
        <div class="check-row">
        <input type="checkbox"
               id="terminos"
               name="terminos"
               required>
        <label for="terminos">
          Estoy de acuerdo con
          <a href="#">Términos y Condiciones</a>
        </label>
      </div>
        <input class="buttons" 
         type="submit" 
         value="Registrar">
        <p><a href="pagina practico 2 copy.html" >¿Ya tengo Cuenta?</a></p>
        </form>
    </section>
</body>

</html>
