<!-- pagina.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="pagina.css">
  <title>Formulario de Registro</title>
</head>

<body>
    <section class="form-register">
    <h4>Formulario de Registro</h4>

    <form action="#" method="POST">

      <!-- Nombre: solo letras, min 2 caracteres -->
      <input class="controls"
             type="text"
             name="nombres"
             id="nombres"
             placeholder="Ingrese su Nombre"
             required
             minlength="2"
             maxlength="50"
             pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]+"
             title="Solo letras y espacios">

      <!-- Apellido: misma validación que nombre -->
      <input class="controls"
             type="text"
             name="apellidos"
             id="apellidos"
             placeholder="Ingrese su Apellido"
             required
             minlength="2"
             maxlength="50"
             pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]+"
             title="Solo letras y espacios">

      <!-- Email: type="email" valida formato automáticamente -->
      <input class="controls"
             type="email"
             name="correo"
             id="correo"
             placeholder="Ingrese su Email"
             required>

      <!-- Contraseña: mínimo 8 caracteres -->
      <input class="controls"
             type="password"
             name="contrasena"
             id="contrasena"
             placeholder="Ingrese su Contraseña"
             required
             minlength="8"
             title="Mínimo 8 caracteres">

      <!-- Checkbox: obligatorio tildar para enviar -->
      <div class="check-row">
        <input type="checkbox"
               id="terminos"
               name="terminos"
               required>
        <label for="terminos">
          Estoy de acuerdo con
          <a href="#">Términos y Condiciones</a>
        </label>
      </div>

      <input class="buttons"
             type="submit"
             value="Registrar">

      <p><a href="login.html">¿Ya tengo Cuenta?</a></p>

    </form>
  </section>
</body>
</html>
